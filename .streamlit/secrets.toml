# ═══════════════════════════════════════════════════════════════
# NewsLens — Streamlit Secrets Configuration
# ═══════════════════════════════════════════════════════════════
#
# Firebase is OPTIONAL. If these sections are missing,
# the app automatically falls back to local SQLite mode.
#
# To enable Firebase:
# 1. Go to https://console.firebase.google.com
# 2. Create a project → Enable Authentication (Google Sign-In)
# 3. Create a Firestore database
# 4. Go to Project Settings → General → Web App → Copy config
# 5. Go to Project Settings → Service Accounts → Generate New Private Key
# 6. Fill in the sections below

# [firebase]
# apiKey = "YOUR_API_KEY"
# authDomain = "YOUR_PROJECT.firebaseapp.com"
# projectId = "YOUR_PROJECT_ID"
# storageBucket = "YOUR_PROJECT.appspot.com"
# messagingSenderId = "YOUR_SENDER_ID"
# appId = "YOUR_APP_ID"

# [firebase_service_account]
# type = "service_account"
# project_id = "YOUR_PROJECT_ID"
# private_key_id = "YOUR_PRIVATE_KEY_ID"
# private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_KEY\n-----END PRIVATE KEY-----\n"
# client_email = "YOUR_SERVICE_EMAIL"
# client_id = "YOUR_CLIENT_ID"
# auth_uri = "https://accounts.google.com/o/oauth2/auth"
# token_uri = "https://oauth2.googleapis.com/token"
